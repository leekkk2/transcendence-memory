name: Release Checks

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate compatibility manifest and docs
        run: |
          test -f compat/release-compatibility.json
          python -m pytest tests/unit/test_release_compatibility.py tests/unit/test_docs_presence.py -q

      - name: Enforce pinned action policy
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          workflows = list(Path(".github/workflows").glob("*.yml"))
          pattern = re.compile(r"uses:\s+[^@\s]+@([0-9a-f]{40})")
          for workflow in workflows:
              content = workflow.read_text(encoding="utf-8")
              uses_lines = [line for line in content.splitlines() if "uses:" in line]
              for line in uses_lines:
                  if "docker://" in line:
                      continue
                  if not pattern.search(line):
                      raise SystemExit(f"Non-pinned action reference found in {workflow}: {line}")
          PY

      - name: Dependency review placeholder
        run: |
          echo "Enable GitHub-native dependency review and push protection on the eventual public host."
          echo "This workflow keeps release checks explicit until the public repository security features are configured."
